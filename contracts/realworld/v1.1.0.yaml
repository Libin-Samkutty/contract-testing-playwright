openapi: "3.0.3"
info:
  title: RealWorld Conduit API
  version: "1.1.0"
  description: "Non-breaking: added optional readTime field to Article"
servers:
  - url: https://api.realworld.io/api
paths:
  /articles:
    get:
      operationId: getArticles
      summary: List articles
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Articles list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultipleArticlesResponse"
  /articles/{slug}:
    get:
      operationId: getArticle
      summary: Get article by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleArticleResponse"
  /tags:
    get:
      operationId: getTags
      summary: Get tags
      responses:
        "200":
          description: Tags list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagsResponse"
components:
  schemas:
    MultipleArticlesResponse:
      type: object
      required:
        - articles
        - articlesCount
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        articlesCount:
          type: integer
    SingleArticleResponse:
      type: object
      required:
        - article
      properties:
        article:
          $ref: "#/components/schemas/Article"
    Article:
      type: object
      required:
        - slug
        - title
        - description
        - body
        - tagList
        - createdAt
        - updatedAt
        - favorited
        - favoritesCount
        - author
      properties:
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        body:
          type: string
        tagList:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        favorited:
          type: boolean
        favoritesCount:
          type: integer
        readTime:
          type: integer
          description: "Added in v1.1.0 — estimated read time in minutes"
        author:
          $ref: "#/components/schemas/Profile"
    Profile:
      type: object
      required:
        - username
      properties:
        username:
          type: string
        bio:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        following:
          type: boolean
    TagsResponse:
      type: object
      required:
        - tags
      properties:
        tags:
          type: array
          items:
            type: string