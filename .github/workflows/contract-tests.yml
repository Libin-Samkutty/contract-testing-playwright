name: Contract Tests

on:
  pull_request:
    branches: [mai, master]
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  # schedule:
  #   # Nightly at 2 AM UTC — detect live API drift
  #   - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────
  # Job 1: Validate all OpenAPI spec files
  # ────────────────────────────────────────────────────────
  validate-specs:
    name: Validate OpenAPI Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install openapi-spec-validator pyyaml

      - name: Validate all spec files
        run: python scripts/validate_specs.py

  # ────────────────────────────────────────────────────────
  # Job 2: Run contract tests with Playwright
  # ────────────────────────────────────────────────────────
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: validate-specs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install \
            pytest \
            playwright \
            pyyaml \
            jsonschema \
            deepdiff \
            openapi-spec-validator

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run contract tests
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --junit-xml=reports/contract-test-results.xml
        continue-on-error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: reports/

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data
          path: coverage_data.json

  # ────────────────────────────────────────────────────────
  # Job 3: Diff check on version tags
  # ────────────────────────────────────────────────────────
  diff-check:
    name: Contract Diff Check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install deepdiff pyyaml

      - name: Diff check — OpenBreweryDB (non-breaking upgrade, should pass)
        run: |
          python scripts/diff_contracts.py \
            --previous contracts/openbrewerydb/v1.0.0.yaml \
            --current contracts/openbrewerydb/v1.1.0.yaml \
            --output reports/diff-openbrewerydb.json \
            --fail-on-breaking
        continue-on-error: false

      - name: Diff check — Petstore v2 (intentional breaking changes, demonstrates detection)
        run: |
          python scripts/diff_contracts.py \
            --previous contracts/petstore/v1.0.0.yaml \
            --current contracts/petstore/v2.0.0.yaml \
            --output reports/diff-petstore-breaking.json
        continue-on-error: true

      - name: Upload diff reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diff-report
          path: reports/diff-*.json

  # ────────────────────────────────────────────────────────
  # Job 5: Coverage report
  # ────────────────────────────────────────────────────────
  coverage-report:
    name: Contract Coverage Report
    runs-on: ubuntu-latest
    needs: contract-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
        continue-on-error: true

      - name: Generate coverage report
        run: |
          python scripts/coverage_report.py \
            --spec contracts/openbrewerydb/v1.1.0.yaml \
            --auto-discover \
            --output reports/coverage-report.json
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: reports/